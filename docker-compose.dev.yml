services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: portfolio_blog
      POSTGRES_USER: blog_user
      POSTGRES_PASSWORD: blog_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/portfolio_blog
      SPRING_R2DBC_USERNAME: blog_user
      SPRING_R2DBC_PASSWORD: blog_pass
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/src:/app/src

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"
    environment:
      API_URL: http://backend:8080
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres-data:
